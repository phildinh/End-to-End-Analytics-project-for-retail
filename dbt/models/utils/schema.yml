version: 2

models:
  - name: dim_calendar
    description: One row per date from 2020-01-01 to 2026-12-31, fully generated in dbt.
    columns:
      - name: Date
        quote: true
        data_tests:
          - unique
          - not_null
      - name: DateKey
        quote: true
        data_tests:
          - unique
          - not_null
